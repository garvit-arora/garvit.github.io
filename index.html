<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=https://garvitarora.xyz/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <link rel="canonical" href="https://garvitarora.xyz/" />
    <script>
      (function () {
        var target = "https://garvitarora.xyz/";

        try {
          window.location.replace(target);
        } catch (error) {
          window.location.href = target;
        }

        window.setTimeout(function () {
          window.location.href = target;
        }, 150);
      })();
    </script>
  </head>
  <body>
    <p>
      Redirecting to
      <a href="https://garvitarora.xyz/">garvitarora.xyz</a>
      ...
    </p>
  </body>
</html>
